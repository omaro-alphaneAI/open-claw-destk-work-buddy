name: Release WorkBuddy Pet

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            command: npm run dist:mac
            artifact_name: release-workbuddy-pet-macos
            artifact_path: |
              dist/*.dmg
              dist/*.zip
              dist/*.blockmap
          - name: Windows
            os: windows-latest
            command: npm run dist:win
            artifact_name: release-workbuddy-pet-windows
            artifact_path: |
              dist/*.exe
              dist/*.blockmap
          - name: Linux
            os: ubuntu-latest
            command: npm run dist:linux
            artifact_name: release-workbuddy-pet-linux
            artifact_path: |
              dist/*.AppImage
              dist/*.deb
              dist/*.blockmap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Linux Packaging Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools icnsutils graphicsmagick xz-utils rpm

      - name: Install Dependencies
        run: npm ci

      - name: Run Smoke Rules
        run: npm run smoke:rules

      - name: Build Release Packages
        run: ${{ matrix.command }}

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-artifacts/*
